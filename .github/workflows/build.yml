name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v4.1.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v4.1.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v4.1.apk
            GlowEdge-v4.1.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.1
          name: GlowEdge v4.1
          body: |
            🎵 GlowEdge v4.1
            ✦ Smarter music detection — now uses rhythm steadiness & vocal sustain, so naat and poetry are recognized better, not just instrumental music
            ✦ New About & Help page — explains every menu, the detection algorithm, features, and full copyright
            ✦ 8 styles, headphone support, notification & charging glow
            Developed by Innovation-313
          files: |
            GlowEdge-v4.1.apk
            GlowEdge-v4.1.aab
