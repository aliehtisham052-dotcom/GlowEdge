name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v5.4.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v5.4.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v5.4.apk
            GlowEdge-v5.4.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0
          name: GlowEdge v6.0 — Clean rewrite
          body: |
            GlowEdge v6.0 - Complete clean rewrite
            - Rebuilt from scratch with cleaner, faster code
            - Glow strictly reacts to music & naat only; stays dark on silence and normal talking
            - 11 styles, 7 color themes, Live Preview, Notification Glow, Battery Saver, Auto-Start
            - Privacy-first: no internet, nothing recorded or shared
            Developed by Innovation-313
          files: |
            GlowEdge-v5.4.apk
            GlowEdge-v5.4.aab
