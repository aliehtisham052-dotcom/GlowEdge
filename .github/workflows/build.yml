name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v4.4.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v4.4.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v4.4.apk
            GlowEdge-v4.4.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.4
          name: GlowEdge v4.4
          body: |
            GlowEdge v4.4 - Privacy-first update
            - Microphone access is now optional; you can skip it and still use call & notification glow
            - Clear privacy promise added in About: no internet, no recording, nothing leaves your device
            - Every extra permission is opt-in and off by default
            - Transparent explanations on every permission screen
            Developed by Innovation-313
          files: |
            GlowEdge-v4.4.apk
            GlowEdge-v4.4.aab
