name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
          cache-disabled: true

      - name: Build debug APK
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo "----- CAPTURED ERROR LINES -----"
            grep -iE "error:|FAILURE|exception|e: file|what went wrong" /tmp/build.log | tail -25 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            echo "----- LAST 30 LINES OF LOG -----"
            tail -30 /tmp/build.log | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          fi

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Run Android Lint (QA pass)
        run: |
          set +e
          gradle lintDebug --no-daemon 2>&1 | tee /tmp/lint.log
          echo "----- LINT SUMMARY -----"
          grep -E "^   [0-9]+ errors|^   [0-9]+ warnings|Lint found" /tmp/lint.log | while IFS= read -r line; do
            echo "::notice::${line}"
          done
        continue-on-error: true

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Lint-Report
          path: app/build/reports/lint-results-debug.html
        continue-on-error: true

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v6.25.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v6.25.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v6.25.apk
            GlowEdge-v6.25.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.25
          name: GlowEdge v6.25 — Neon Lines + vivid colors
          body: |
            GlowEdge v6.25 - Neon Lines style + vivid colors + denser bars
            - NEW STYLE: Neon Lines - two concentric neon frames that rotate in opposite directions at different speeds, weaving past each other, with a soft outer bloom and a crisp bright inner core. 13 styles total now.
            - Colors are now more vivid: full-saturation rainbow, and a saturation/brightness boost on theme colors so the glow reads bright and punchy.
            - Denser line styles: Side Bars 40 to 56, Bars Around sides 34 to 46 and top/bottom 26 to 34, with thinner bars for a premium equalizer look.
            - Also includes the live wallpaper battery ring and clean edge-glow wallpapers.
          files: |
            GlowEdge-v6.25.apk
            GlowEdge-v6.25.aab
