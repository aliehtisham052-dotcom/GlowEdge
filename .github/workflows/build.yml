name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v3.4.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v3.4.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v3.4.apk
            GlowEdge-v3.4.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.4
          name: GlowEdge v3.4
          body: |
            🎵 GlowEdge v3.4
            ✦ Glow now reaches the very bottom edge (behind the navigation bar)
            ✦ Covers the full real screen, top to bottom
            ✦ Professional UI, edge-to-edge, loudness-reactive, 6 styles
            Developed by Innovation-313
          files: |
            GlowEdge-v3.4.apk
            GlowEdge-v3.4.aab
