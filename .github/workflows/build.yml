name: Build GlowEdge APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-APK
          path: GlowEdge-v1.0.apk

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: GlowEdge v1.0
          body: |
            🎵 GlowEdge v1.0 — Music-reactive edge lighting visualizer for Android.
            Download the APK below and install it on any Android 8.0+ phone.
          files: GlowEdge-v1.0.apk
