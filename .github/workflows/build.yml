name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
          cache-disabled: true

      - name: Build debug APK
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo "----- CAPTURED ERROR LINES -----"
            grep -iE "error:|FAILURE|exception|e: file|what went wrong" /tmp/build.log | tail -25 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            echo "----- LAST 30 LINES OF LOG -----"
            tail -30 /tmp/build.log | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          fi

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Run Android Lint (QA pass)
        run: |
          set +e
          gradle lintDebug --no-daemon 2>&1 | tee /tmp/lint.log
          echo "----- LINT SUMMARY -----"
          grep -E "^   [0-9]+ errors|^   [0-9]+ warnings|Lint found" /tmp/lint.log | while IFS= read -r line; do
            echo "::notice::${line}"
          done
        continue-on-error: true

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Lint-Report
          path: app/build/reports/lint-results-debug.html
        continue-on-error: true

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v6.57.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v6.57.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v6.57.apk
            GlowEdge-v6.57.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.57
          name: GlowEdge v6.57 - Reduce overlay CPU load
          body: |
            GlowEdge v6.57 - Lighter overlay, less impact on other apps
            - FOUND THE CAUSE: the glow overlay sits above every app and must render in software (the blur effect forces LAYER_TYPE_SOFTWARE, which is not hardware-accelerated). It was redrawing the full screen 30 times a second whenever active - that competes directly for CPU with whatever app is in the foreground, which is the real way an always-on overlay makes OTHER apps feel sluggish, especially on weaker phones.
            - Lowered the overlay to 20fps (was 30fps) - a third less CPU/compositing work with no visible difference for a slow ambient border glow.
            - Fixed the notification listener touching disk (SharedPreferences) on every single notification from every app on the device - now reads it once and reuses it.
            - Honest note: this reduces the impact significantly but does not eliminate it completely - a full fix would mean moving the blur to the GPU (RenderEffect, Android 12+), a bigger rendering change we can tackle separately if still needed after this.
          files: |
            GlowEdge-v6.57.apk
            GlowEdge-v6.57.aab
