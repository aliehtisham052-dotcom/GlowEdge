name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v5.5.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v5.5.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v5.5.apk
            GlowEdge-v5.5.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.5
          name: GlowEdge v5.5 — Smooth & light (no more hang)
          body: |
            GlowEdge v5.5 - Performance update (audited, professional pass)
            - Fixed the phone-hang: redraw capped to ~30fps, blur filters cached (no memory churn), audio processing halved
            - Battery Saver is now ON by default (lighter glow, less power)
            - Security audit passed: NO internet permission, no tracking, no malicious code - nothing can leave your device
            - Music/naat-only glow, 11 styles, 7 themes, notification glow
            Developed by Innovation-313
          files: |
            GlowEdge-v5.5.apk
            GlowEdge-v5.5.aab
