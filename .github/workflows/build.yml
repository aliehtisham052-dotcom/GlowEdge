name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v6.2.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v6.2.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v6.2.apk
            GlowEdge-v6.2.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.2
          name: GlowEdge v6.2 — Personal Glow Text
          body: |
            GlowEdge v6.2 - Personal Glow Text
            - NEW: "Meri Glow Text" — write your own name/word in any language/script; it drifts gently around the edge, on top of whichever style is active. Fully optional (off by default), your own custom color, does not change the glow effect itself.
            - Live Preview and Test Glow both show it instantly so you can try before enabling.
            Developed by Innovation-313
          files: |
            GlowEdge-v6.2.apk
            GlowEdge-v6.2.aab
