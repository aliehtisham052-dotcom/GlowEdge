name: Build GlowEdge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release AAB (for Play Store)
        run: gradle bundleRelease --no-daemon

      - name: Rename outputs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GlowEdge-v4.6.apk
          cp app/build/outputs/bundle/release/app-release.aab GlowEdge-v4.6.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GlowEdge-Build
          path: |
            GlowEdge-v4.6.apk
            GlowEdge-v4.6.aab

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.6
          name: GlowEdge v4.6
          body: |
            GlowEdge v4.6
            - Fixed Live Preview: it now updates instantly and correctly for every style and color theme
            - 11 styles, 7 themes, music/naat detection, privacy-first
            Developed by Innovation-313
          files: |
            GlowEdge-v4.6.apk
            GlowEdge-v4.6.aab
